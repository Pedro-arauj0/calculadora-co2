<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora de emissão de CO2 para diferentes modos de transporte">
    <title>Calculadora de Emissão de CO₂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <h1 class="header__title">🌿 Calculadora de Emissão de CO₂</h1>
            <p class="header__subtitle">Calcule o impacto ambiental do seu deslocamento e descubra como reduzir sua pegada de carbono</p>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <form id="calculator-form" class="calculator-form">
                <fieldset class="calculator-form__fieldset">
                    <legend class="calculator-form__legend">Dados do Trajeto</legend>

                    <div class="form-group">
                        <label for="origin" class="form-group__label">Origem:</label>
                        <input
                            type="text"
                            id="origin"
                            class="form-group__input"
                            placeholder="Selecione sua cidade de origem"
                            list="cities-list"
                            required
                        >
                        <datalist id="cities-list"></datalist>
                    </div>

                    <div class="form-group">
                        <label for="destination" class="form-group__label">Destino:</label>
                        <input
                            type="text"
                            id="destination"
                            class="form-group__input"
                            placeholder="Selecione sua cidade de destino"
                            list="cities-list"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="distance" class="form-group__label">Distância (km):</label>
                        <input
                            type="number"
                            id="distance"
                            class="form-group__input"
                            placeholder="0"
                            min="0"
                            step="0.1"
                            readonly
                            required
                        >
                        <small class="form-group__helper-text">A distância será preenchida automaticamente</small>
                    </div>

                    <div class="form-group form-group--checkbox">
                        <input
                            type="checkbox"
                            id="manual-distance"
                            class="form-group__checkbox"
                        >
                        <label for="manual-distance" class="form-group__checkbox-label">Inserir distância manualmente</label>
                    </div>
                </fieldset>

                <fieldset class="calculator-form__fieldset">
                    <legend class="calculator-form__legend">Modo de Transporte</legend>

                    <div class="transport-grid">
                        <label class="transport-option">
                            <input
                                type="radio"
                                name="transport"
                                value="bicycle"
                                class="transport-option__input"
                            >
                            <span class="transport-option__icon">🚴</span>
                            <span class="transport-option__text">Bicicleta</span>
                        </label>

                        <label class="transport-option">
                            <input
                                type="radio"
                                name="transport"
                                value="car"
                                class="transport-option__input"
                                checked
                            >
                            <span class="transport-option__icon">🚗</span>
                            <span class="transport-option__text">Carro</span>
                        </label>

                        <label class="transport-option">
                            <input
                                type="radio"
                                name="transport"
                                value="bus"
                                class="transport-option__input"
                            >
                            <span class="transport-option__icon">🚌</span>
                            <span class="transport-option__text">Ônibus</span>
                        </label>

                        <label class="transport-option">
                            <input
                                type="radio"
                                name="transport"
                                value="truck"
                                class="transport-option__input"
                            >
                            <span class="transport-option__icon">🚚</span>
                            <span class="transport-option__text">Caminhão</span>
                        </label>
                    </div>
                </fieldset>

                <button type="submit" class="calculator-form__button">Calcular Emissão</button>
            </form>

            <section id="results" class="results hidden">
                <div id="results-content" class="results__content"></div>
            </section>

            <section id="comparison" class="comparison hidden">
                <div id="comparison-content" class="comparison__content"></div>
            </section>

            <section id="carbon-credits" class="carbon-credits hidden">
                <div id="carbon-credits-content" class="carbon-credits__content"></div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container">
            <p class="footer__text">Desenvolvido com ❤️ para a DIO | Projeto GitHub Copilot do Pedro</p>
        </div>
    </footer>

    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
